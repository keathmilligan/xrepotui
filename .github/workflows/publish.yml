name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # Skip runs triggered by tag deletion (e.g. when re-tagging after a failed release)
    if: github.event_name == 'workflow_dispatch' || github.event.after != '0000000000000000000000000000000000000000'
    uses: keathmilligan/release-infra/.github/workflows/publish.yml@master
    with:
      project-name: xrepotui
      binary-name: xrepotui
      project-type: rust
      targets: >-
        x86_64-apple-darwin,
        aarch64-apple-darwin,
        x86_64-pc-windows-msvc,
        aarch64-pc-windows-msvc,
        x86_64-unknown-linux-gnu,
        aarch64-unknown-linux-gnu,
        x86_64-unknown-linux-musl,
        aarch64-unknown-linux-musl
      tap-repo: keathmilligan/homebrew-tap
      bucket-repo: keathmilligan/scoop-bucket
      packages-repo: keathmilligan/packages
      enable-cargo: true
      enable-install-scripts: true
      enable-homebrew: true
      enable-scoop: true
      enable-chocolatey: false
      enable-winget: false
      enable-apt: true
      enable-rpm: true
      enable-apk: false
      enable-dmg: true
      enable-msi: true
      enable-aur: false
      enable-badges: true
    secrets: inherit
