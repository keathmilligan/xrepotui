name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to create (e.g. v1.2.3)
        required: true
        type: string
      force:
        description: Skip version increment validation (use for re-releases)
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    uses: keathmilligan/release-infra/.github/workflows/release.yml@master
    with:
      tag: ${{ inputs.tag }}
      force: ${{ inputs.force }}
      package-name: xrepotui
